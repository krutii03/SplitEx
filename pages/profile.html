<div class="profile-container">
    <h1>Profile</h1>

<!-- View Details -->
    <div class="profile-card" id="viewProfileSection">
        <img id="profileImage" src="../assets/img/profilelogo.jpg" alt="Profile Photo">
        <h2 id="profileName">User Name</h2>
        <div class="profile-info">
            <p><strong>Email:</strong> <span id="profileEmail"></span></p>
            <p><strong>Phone:</strong> <span id="profilePhone"></span></p>
            <p><strong>Birthdate:</strong> <span id="profileBirthdate"></span></p>
            <p><strong>Gender:</strong> <span id="profileGender"></span></p>
        </div>
        <button id="editProfileBtn">Edit Profile</button>
    </div>

<!-- Edit Form -->
    <form id="editProfileSection" class="edit-profile-form" style="display:none;">
        <div class="profile-photo" id="editProfilePhoto">
            <img id="editProfileImagePreview" src="../assets/img/profilelogo.jpg" alt="Profile Photo">
            <input type="file" id="editProfileImageUpload" accept="image/*" hidden>
            <span class="edit-icon" id="editIcon">✎</span>
        </div>
        <input type="hidden" id="editSelectedProfileImage" value="">

        <label>Name</label>
        <input type="text" id="name" required><br>

        <label>Email</label>
        <input type="email" id="email" disabled><br>

        <label>Phone</label>
        <input type="tel" id="phone" required><br>

        <label>Birthdate</label>
        <input type="date" id="birthdate" required><br>

        <label>Gender</label>
        <select id="gender" required>
            <option value="" disabled>Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
        </select><br>

        <button type="submit" id="saveProfile">Save Changes</button>
    </form>
</div>
