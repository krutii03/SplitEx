<div class="edit-profile-container">
    <h1>Edit Profile</h1>
    <form id="editProfileForm" class="edit-profile-form">
        <div class="profile-photo" id="editProfilePhoto">
            <img id="editProfileImagePreview" src="../assets/img/profilelogo.jpg" alt="Profile Photo">
            <input type="file" id="editProfileImageUpload" accept="image/*" hidden>
            <span class="edit-icon" id="editIcon">✎</span>
        </div>
        
        <input type="hidden" id="editSelectedProfileImage" value="">

        <label for="name">Name</label>
        <input type="text" id="name" required>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="*CANNOT CHANGE EMAIL ADDRESS*" disabled>

        <label for="phone">Phone</label>
        <input type="tel" id="phone" required>

        <label for="birthdate">Birthdate</label>
        <input type="date" id="birthdate" required>

        <label for="gender">Gender</label>
        <select id="gender" required>
            <option value="" disabled>Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
        </select>

        <button type="submit" id="saveProfile">Save Changes</button>
    </form>
</div>
