<div class="friends-container">
  <h2>Invite a Friend</h2>
  <form id="inviteForm">
    <input type="email" id="inviteEmail" placeholder="Enter friend's email" required />
    <input type="text" id="nickname" placeholder="Enter friend's nickname" required />
    <button type="submit">Add Friend</button>
  </form>
  <p id="inviteStatus"></p>

  <!-- Friends List -->

  <h3>My Friends</h3>
  <div class="search-box">
    <input type="text" id="friendSearch" placeholder="Search friends..." />
  </div>

  <div id="friendList"></div>
</div>
