<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Groups - SplitEx</title>
  <link rel="stylesheet" href="../assets/css/groups.css" />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body id="groupsPage">
  <div class="groups-header">
    <h1>Groups</h1>
    <button id="addGroupBtn" type="button">+ Add Group</button>
  </div>

  <!-- groups list -->
  <div id="queryLoader" class="loader" style="display: none;"></div>

  <div id="groupList" class="group-list"></div>

  <div id="groupChat" class="group-chat" style="display: none;">
    <div class="chat-header">
      <h2 id="chatGroupName">Group Name</h2>
      <button id="closeChat" type="button" aria-label="Close chat">✕</button>
    </div>
    <div class="chat-content" id="chatContent"></div>
    <div class="chat-input">
      <input type="text" id="expenseInput" placeholder="Add an expense..." />
      <button id="addExpense" type="button">Send</button>
    </div>
  </div>

  <!-- add group -->
  <div id="groupModal" class="modal" style="display: none;">
    <div class="modal-content">
      <h2>Add New Group</h2>

      <label for="groupPhoto">Group Photo</label>
      <input type="file" id="groupPhoto" accept="image/*"/>

      <label for="groupNameInput">Group Name</label>
      <input type="text" id="groupNameInput" placeholder="Enter group name" required />

      <label>Members</label>
      <div id="membersContainer"></div>
      <button id="addMemberBtn" type="button">+ Add Member</button>

      <div class="modal-actions">
        <button id="createGroup" type="button">Create</button>
        <button id="closeModal" type="button" aria-label="Cancel and close modal">Cancel</button>
      </div>
    </div>
  </div>

  <div id="contentContainer"></div>
</body>
</html>
